<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeLeaf.org" th:replace="base::Layout(~{::section})">
	<head>
		
		<meta charset="UTF-8" />
		<title>Verify OTP Form</title>
		
	</head>
<body>
	<section>
		<div id="login">
       
        <div class="container">
            <div id="login-row" class="row justify-content-center align-items-center">
                <div id="login-column" class="col-md-6">
                    <div id="login-box" style="height: 220px;" class="col-md-12">
						
						
                        <!-- Email Form-->
                        <div class="alert alert-success mt-3" role="alert">
                             We have sent otp to your email..
                        </div>
                        
                    <!--     <div  class="container">
						
						 <div class="alert alert-danger my-2 text-center" role="alert">
			              
			              <span th:text="${session.message}"></span>
			              
			         </div>	
			         
			          <th:block th:text="${#session.removeAttribute('message')}"></th:block>   
			         
					</div>    -->
					
					
					<div th:if="${message}" class="container">
					   <div class="alert alert-danger my-2 text-center" role="alert">
					      <span th:text="${message}"></span>
					   </div>	
					</div>

					
                        
                        <form method="post"  action="" th:action="@{/verify-otp}">
							
							<div class="from-group">
								
								<input name="otp" required="required" type="text" placeholder="Enter OTP here" class="form-control" />
								
							</div>
							
							<div>
								
								<div class="container text-center mt-2">
									
									<button class="btn btn-warning">Verify</button>
									
								</div>
								
							</div>
							
						</form>
                        
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
	</section>
</body>
</html>
